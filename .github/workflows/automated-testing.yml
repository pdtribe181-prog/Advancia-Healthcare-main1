# Automated Testing — Full coverage matrix across Node versions
# Runs on all PRs and push to main/develop
#
# Optional GitHub Secrets:
#   CODECOV_TOKEN — Upload token for Codecov coverage reporting

name: Automated Testing (Extended)

on:
  # Run on demand, and on a weekly schedule (keeps the Node matrix valuable without slowing PRs).
  workflow_dispatch:
  schedule:
    # Every Monday at 02:30 UTC
    - cron: '30 2 * * 1'

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Backend Unit Tests (matrix across Node 20/22; Node 18 removed — ESM/Jest issues)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']  # LTS + current; matches package.json engines

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --forceExit
        env:
          NODE_ENV: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          JWT_SECRET: test-jwt-secret-min-32-chars-long-enough

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Coverage Report (Node 20 only)
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --forceExit
        env:
          NODE_ENV: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          JWT_SECRET: test-jwt-secret-min-32-chars-long-enough

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Frontend Vitest
  # ─────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:run

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: E2E Tests (Playwright API — skip on draft PRs)
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright API)
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend-tests]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run API E2E tests
        run: npm run test:e2e:api -- --project=chromium
        env:
          CI: true
          NODE_ENV: test
          PORT: 3000
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'test-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-service-key' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Test Summary Gate — required status check
  # ─────────────────────────────────────────────────────────────────────────
  tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [unit-tests, coverage, frontend-tests]
    if: always()
    steps:
      - name: Check all test jobs
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "unit-tests failed"
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "coverage job failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "frontend-tests failed"
            exit 1
          fi
          echo "All test jobs passed!"
