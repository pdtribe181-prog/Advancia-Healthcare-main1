name: Playwright Nightly

on:
  schedule:
    # Nightly at 03:30 UTC
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: playwright-nightly
  cancel-in-progress: false

jobs:
  full-e2e:
    name: Full E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run full Playwright suite
        run: npm run test:e2e
        env:
          CI: true
          NODE_ENV: test
          PORT: 3000
          # Use real secrets if available; otherwise fall back to placeholders.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'test-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-service-key' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder00000000000000' }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_placeholder00000000000000' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_test_placeholder' }}
          FRONTEND_URL: http://localhost:5173
          VITE_API_URL: http://127.0.0.1:3000/api/v1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
