# Docker Publish — Build and push image to GitHub Container Registry
# Triggered on push to main (production tag) and develop (latest-dev tag)
# Also runs on version tags (v*.*.*) → semantic version tags

name: Docker Publish

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # for provenance attestation
      attestations: write  # for actions/attest-build-provenance

    steps:
      - uses: actions/checkout@v6

      # ── Set up QEMU for multi-platform builds ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Set up Docker Buildx ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Log in to GHCR ──
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Extract metadata (tags & labels) ──
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main branch → latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # develop branch → latest-dev
            type=raw,value=latest-dev,enable=${{ github.ref == 'refs/heads/develop' }}
            # version tags → semver
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # SHA short for traceability
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Advancia PayLedger API
            org.opencontainers.image.description=Healthcare payment and compliance management platform
            org.opencontainers.image.vendor=Advancia
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      # ── Build (PR: no push, just validate) ──
      - name: Build Docker image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: config/Dockerfile
          push: false
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build + Push (main/develop/tag) ──
      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: config/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ── Attest build provenance ──
      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | ghcr.io/${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | $(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ') |" >> $GITHUB_STEP_SUMMARY
