# CI/CD Pipeline — Advancia PayLedger
# Full pipeline: lint → test → build → deploy
# Manual-only (workflow_dispatch) to avoid duplicating PR CI.
# Use for ad-hoc full pipeline runs and future deploy steps.
#
# Required GitHub Secrets (for deploy jobs):
#   RENDER_DEPLOY_HOOK_URL          — Render deploy-hook URL for production
#   RENDER_STAGING_DEPLOY_HOOK_URL  — Render deploy-hook URL for staging
#
# Required GitHub Environments:
#   production — https://api.advanciapayledger.com
#   staging    — (optional)

name: CI/CD Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB: Lint & Type Check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Backend Unit Tests
  # ─────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          JWT_SECRET: test-jwt-secret-min-32-chars-long-enough

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Frontend Tests
  # ─────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm run test:run

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.advanciapayledger.com/api/v1
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Build
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Deploy to Render (Staging)
  # Requires GitHub secret: RENDER_DEPLOY_HOOK_URL
  # Set in: GitHub → Settings → Secrets → Actions → RENDER_DEPLOY_HOOK_URL
  # ─────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Render (Staging)
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Triggering Render staging deploy..."
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "❌ Render deploy hook returned $response"
            exit 1
          fi
          echo "✅ Render deploy triggered successfully"
