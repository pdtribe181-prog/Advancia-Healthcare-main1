# Upstream for Node.js Backend (PM2)
upstream advancia_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Advancia PayLedger - Single Domain Config
server {
    listen 80;
    server_name advanciapayledger.com www.advanciapayledger.com _;

    # Root for React Frontend Build
    root /var/www/advancia/frontend/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/advancia.access.log;
    error_log /var/log/nginx/advancia.error.log;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # API routes - proxy ALL methods to backend
    # Frontend calls /api/v1/health -> Backend receives /health
    location ^~ /api/v1/ {
        # Allow all HTTP methods
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for long requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Don't buffer for webhooks (raw body needed)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Stripe webhook - ensure raw body is preserved (backend expects /api/v1/stripe/webhook)
    location = /api/v1/stripe/webhook {
        proxy_pass http://127.0.0.1:3000/api/v1/stripe/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical: Don't modify the body for Stripe signature verification
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Frontend SPA - catch all for React Router
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Handle 405 errors - allow POST on static files (redirect to index.html)
    error_page 405 =200 /index.html;
}
