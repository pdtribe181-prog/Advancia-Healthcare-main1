# Advancia PayLedger - Nginx Configuration
# Place in /etc/nginx/sites-available/ and symlink to /etc/nginx/sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=50r/s;

# Upstream backend (PM2 cluster)
upstream advancia_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS (API + www)
server {
    listen 80;
    listen [::]:80;
    server_name api.advanciapayledger.com www.advanciapayledger.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect www → apex (permanent)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.advanciapayledger.com;

    ssl_certificate /etc/letsencrypt/live/advanciapayledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/advanciapayledger.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://advanciapayledger.com$request_uri;
}

# API server (api.advanciapayledger.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.advanciapayledger.com;

    # SSL certificates (use certbot)
    ssl_certificate /etc/letsencrypt/live/api.advanciapayledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.advanciapayledger.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 256;

    # Max body size for file uploads
    client_max_body_size 10m;

    # Health check (no rate limit)
    location /health {
        proxy_pass http://advancia_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Auth routes (strict rate limit)
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://advancia_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Webhook routes (higher rate limit)
    location /api/v1/webhooks/ {
        limit_req zone=webhooks burst=20 nodelay;

        proxy_pass http://advancia_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Stripe webhook (raw body needed)
    location /api/v1/stripe/webhook {
        limit_req zone=webhooks burst=20 nodelay;

        proxy_pass http://advancia_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # All other API routes
    location / {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://advancia_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/advancia-api-access.log;
    error_log /var/log/nginx/advancia-api-error.log;
}
